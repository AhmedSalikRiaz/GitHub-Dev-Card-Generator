<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a202c; }</style>
</head>
<body>
    
    <div class="p-6 rounded-2xl border-2 shadow-2xl max-w-md bg-blue-900 text-white font-sans border-blue-400">
        <div class="flex items-center mb-4">
            <img src="https://avatars.githubusercontent.com/u/1024025?v=4" class="w-20 h-20 rounded-full border-2 border-current mr-4" />
            <div>
                <h2 class="text-2xl font-bold">Linus Torvalds</h2>
                <p class="text-sm italic">@torvalds</p>
            </div>
        </div>
        <p class="mb-4 text-lg">"A dedicated code enthusiast."</p>
        <div class="mb-4"><span class="px-2 py-1 rounded-full text-xs border border-current mr-2">Python</span><span class="px-2 py-1 rounded-full text-xs border border-current mr-2">Git</span><span class="px-2 py-1 rounded-full text-xs border border-current mr-2">Problem Solving</span></div>
        <div class="grid grid-cols-2 gap-4 mb-4 text-center">
            <div class="p-2 border border-current rounded">
                <div class="text-xl font-bold">11</div>
                <div class="text-xs uppercase">Repos</div>
            </div>
            <div class="p-2 border border-current rounded">
                <div class="text-xl font-bold">303208</div>
                <div class="text-xs uppercase">Followers</div>
            </div>
        </div>
        <div class="mb-4">
            <h3 class="text-sm font-bold uppercase mb-2 border-b border-current">Top Projects</h3>
            <div class="mb-2"><strong>linux</strong> ★233427 <span class="text-xs">(C)</span></div><div class="mb-2"><strong>AudioNoise</strong> ★4366 <span class="text-xs">(C)</span></div><div class="mb-2"><strong>uemacs</strong> ★2025 <span class="text-xs">(C)</span></div>
        </div>
        <div class="text-[10px] opacity-75">
            <strong>Fun Fact:</strong> Has a secret love for clean commits.
        </div>
    </div>
    
</body>
</html>
